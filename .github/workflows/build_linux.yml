name: Build Linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不填则使用时间戳）'
        required: false
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev git yasm nasm libuchardet-dev libdvdread-dev libdvdnav-dev python3 meson patchelf

      - name: Build mpv 1.x from source
        run: |
          cd /tmp
          git clone --depth 1 --branch v1.2.2 https://github.com/mpv-player/mpv.git
          cd mpv
          python3 bootstrap.py
          meson setup build --prefix=/tmp/mpv1-install -Dlibmpv_shared=true -Dlua=false -Dcdda=false -Ddvd=false -Dbluray=false
          meson compile -C build
          meson install -C build

      - name: Enable Flutter Desktop
        run: flutter config --enable-linux-desktop

      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Patch lib path for mpv 1.x
        run: |
          MPV_LIB="/tmp/mpv1-install/lib"
          ls "$MPV_LIB/"
          echo "mpv 1.x built successfully"

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Build Linux
        run: |
          cd simple_live_app
          flutter_distributor package --platform linux --targets deb,zip --skip-clean

      - name: Bundle mpv 1.x into app
        run: |
          MPV_LIB="/tmp/mpv1-install/lib"
          BUNDLE_DIR=$(find simple_live_app/build/dist -name "bundle" -type d | head -1)
          if [ -d "$BUNDLE_DIR/lib" ]; then
            cp -av "$MPV_LIB/libmpv.so"* "$BUNDLE_DIR/lib/"
            patchelf --set-rpath '$ORIGIN/lib' "$BUNDLE_DIR/simple_live_app"
            ls -la "$BUNDLE_DIR/lib/" | grep mpv
            ldd "$BUNDLE_DIR/simple_live_app" | grep mpv
            echo "mpv 1.x bundled successfully"
          else
            echo "Bundle dir not found"
            find simple_live_app/build -type d -name "bundle" 2>/dev/null
          fi

      - name: Upload Linux APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="linux-$(date +%Y%m%d%H%M%S)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          prerelease: true
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip
